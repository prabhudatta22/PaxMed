services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paxmed
      POSTGRES_PASSWORD: paxmed
      POSTGRES_DB: paxmed
    ports:
      - "5432:5432"
    volumes:
      - paxmed_pg:/var/lib/postgresql/data

  redis:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]

volumes:
  paxmed_pg:
