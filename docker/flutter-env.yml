# Reproducible Flutter CLI (matching CI / machines without Flutter installed).
#
# Important: fetch packages before build in the same container run (ephemeral HOME/pub-cache).
# Usage from repo root:
#   docker compose -f docker/flutter-env.yml run --rm flutter bash -lc "flutter pub get && flutter build apk --release"

services:
  flutter:
    image: ghcr.io/cirruslabs/flutter:stable
    working_dir: /work/apps/flutter/paxmed_app
    volumes:
      - ..:/work
    stdin_open: true
    tty: true
