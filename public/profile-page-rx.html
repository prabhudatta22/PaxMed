<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PaxMed — Prescriptions</title>
    <link rel="icon" href="/PaxMedLogo.png" type="image/png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="profile-embed-page">
    <main class="profile-embed-inner">
      <section id="rxCard" class="profile-card">
        <div class="section-head">
          <div>
            <h3 style="margin-bottom: 0.25rem">Saved prescriptions</h3>
            <p class="muted section-sub">
              Photos or PDFs for checkout and order history. Same files appear when you place home delivery or diagnostics
              orders.
            </p>
          </div>
        </div>
        <p class="muted" id="rxStatus" style="margin: 0 0 0.75rem"></p>
        <label class="field" style="max-width: 22rem">
          <span>Upload (camera or file)</span>
          <input id="rxProfileUpload" type="file" accept="image/*,application/pdf" capture="environment" />
        </label>
        <div id="rxList" class="stack" style="margin-top: 0.75rem"></div>
      </section>
    </main>
    <script type="module" src="/profile-page-rx.js"></script>
  </body>
</html>
