<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PaxMed — orders</title>
    <link rel="icon" href="/PaxMedLogo.png" type="image/png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/landing.html" style="text-decoration: none; color: inherit">
          <img class="brand-mark" src="/PaxMedLogo.png" alt="PaxMed" width="150" height="150" />
          <div>
            <h1>PaxMed</h1>
            <p class="tagline">Your orders</p>
          </div>
        </a>
        <nav class="header-nav" aria-label="Account">
          <a href="/index.html" class="nav-link">Medicines</a>
          <a href="/labs.html" class="nav-link">Diagnostics</a>
          <a href="/checkout.html" class="nav-link">Cart</a>
          <a href="/profile.html?view=details" id="navProfile" class="nav-link">Profile</a>
          <a href="/login.html" id="navLogin" class="nav-link">Login</a>
        </nav>
      </div>
    </header>

    <main class="shell">
      <section class="panel">
        <div class="section-head">
          <div>
            <h2 style="margin-bottom: 0.25rem">Order history (last 10)</h2>
            <p class="muted section-sub">Track status and delivery timeline for your latest orders.</p>
          </div>
        </div>
        <p id="ordersStatus" class="muted" style="margin: 0 0 0.75rem"></p>
        <div class="table-wrap">
          <table class="price-table">
            <thead>
              <tr>
                <th>Order</th>
                <th>Status</th>
                <th>Delivery</th>
                <th>Fee</th>
                <th>Placed</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="ordersRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="/orders.js"></script>
  </body>
</html>
